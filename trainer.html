<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>HSK 1 · Тренажёр</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f6;--bg2:#f2f0eb;--border:#ddd9d0;--border2:#c8c3b8;
  --text:#1a1a18;--text2:#6b6860;--text3:#a09d96;
  --red:#c0392b;--red-bg:#fdf0ef;
  --green:#27ae60;--green-bg:#f0faf4;--green-border:#a8d5b5;
  --cell:120px;
  --font:'Noto Sans SC','Inter',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.logo{font-size:13px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:14px}
.progress{font-size:13px;color:var(--text2)}
.progress b{color:var(--text);font-weight:600}
.exit-btn{font-size:13px;padding:5px 13px;border-radius:14px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:none}
.exit-btn:hover{background:var(--bg2)}
.exit-btn.visible{display:block}

/* ── SETUP ── */
.setup{max-width:600px;margin:0 auto;padding:32px 20px}
.setup-hero{text-align:center;margin-bottom:36px}
.setup-hero h1{font-size:32px;font-weight:300;color:var(--text);margin-bottom:6px}
.setup-hero p{font-size:14px;color:var(--text2)}
.setup-section{margin-bottom:28px}
.setup-section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}

/* Сетка уроков */
.lessons-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.lesson-card{
  border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;
  cursor:pointer;transition:all .15s;background:white;text-align:left;
}
.lesson-card:hover{border-color:var(--border2);background:var(--bg2)}
.lesson-card.active{border-color:var(--red);background:var(--red-bg)}
.lc-num{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.lesson-card.active .lc-num{color:var(--red)}
.lc-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.35}
.lesson-card.active .lc-title{color:var(--red)}
.lc-count{font-size:11px;color:var(--text3);margin-top:3px}

.select-all-row{display:flex;gap:8px;margin-bottom:14px}
.sel-btn{font-size:12px;padding:5px 14px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.sel-btn:hover{background:var(--bg2)}

.setup-footer{text-align:center;padding-top:8px}
.start-btn{font-size:15px;font-weight:500;padding:13px 44px;border-radius:28px;border:none;background:var(--red);color:#fff;cursor:pointer;transition:opacity .15s}
.start-btn:hover{opacity:.88}
.start-btn:disabled{opacity:.4;cursor:default}
.word-count{font-size:13px;color:var(--text3);margin-top:10px}

/* ── TRAINER ── */
.trainer{display:none;flex:1;flex-direction:column;align-items:center;padding:20px;gap:16px}
.trainer.active{display:flex}
.queue-bar{width:100%;max-width:560px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.queue-fill{height:100%;background:var(--red);border-radius:2px;transition:width .3s}

/* CARD */
.card{width:100%;max-width:560px;background:white;border:1px solid var(--border);border-radius:16px;overflow:hidden}
.card-prompt{padding:28px 28px 22px;text-align:center;border-bottom:1px solid var(--border)}
.card-pinyin{font-size:26px;color:var(--red);margin-bottom:8px;letter-spacing:.04em}
.card-trans{font-size:17px;color:var(--text2)}

/* WRITING */
.card-write{padding:20px 24px;border-bottom:1px solid var(--border)}
.write-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.write-cells{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
.write-cell-group{display:flex;flex-direction:column;align-items:center;gap:4px}
.write-cell-hint{font-size:10px;color:var(--text3)}
.write-area{position:relative;width:var(--cell);height:var(--cell);border:1.5px solid var(--border2);border-radius:10px;background:white;cursor:crosshair;overflow:hidden;flex-shrink:0}
.write-area .hline{position:absolute;left:0;top:50%;width:100%;height:1px;background:#e0ddd8;pointer-events:none;z-index:1}
.write-area .vline{position:absolute;left:50%;top:0;width:1px;height:100%;background:#e0ddd8;pointer-events:none;z-index:1}
.write-area svg{position:absolute;inset:0;pointer-events:none;z-index:1;width:100%;height:100%}
.write-area canvas{position:absolute;inset:0;z-index:2;touch-action:none}
.write-controls{display:flex;gap:8px;margin-top:12px;align-items:center}
.erase-btn{font-size:12px;padding:5px 14px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.erase-btn:hover{background:var(--bg2)}
.show-btn{font-size:13px;font-weight:500;padding:8px 22px;border-radius:14px;border:none;background:var(--bg2);color:var(--text);cursor:pointer;margin-left:auto}
.show-btn:hover{background:var(--border)}

/* ANSWER */
.answer-row{display:none;padding:16px 24px;border-bottom:1px solid var(--border);flex-direction:column;gap:16px}
.answer-row.visible{display:flex}
.answer-section{display:flex;flex-direction:column;gap:8px}
.answer-section-correct{padding-top:4px;border-top:1px solid var(--border)}
.answer-sublabel{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.answer-cells{display:flex;gap:6px}
.answer-hanzi-big{font-size:64px;line-height:1;color:var(--text);font-weight:300}
.answer-pinyin-sm{font-size:15px;color:var(--red)}

/* STROKE ORDER */
.stroke-order-row{display:flex;flex-direction:column;gap:10px}
.so-char-row{display:flex;flex-wrap:wrap;align-items:flex-start;gap:6px}
.so-char-label{font-size:36px;line-height:1;color:var(--text);font-weight:300;min-width:44px;text-align:center;margin-right:4px;align-self:center}
.stroke-order-char-group{display:flex;flex-wrap:wrap;gap:4px;margin-right:10px}
.stroke-order-char-group:last-child{margin-right:0}
.so-cell{display:flex;flex-direction:column;align-items:center;gap:2px}
.so-num{font-size:9px;color:var(--text3)}
.so-svg-wrap{border:1px solid var(--border);border-radius:5px;background:white;overflow:hidden}
.stroke-loading{font-size:12px;color:var(--text3);padding:4px 0}

/* VERDICT */
.verdict{padding:16px 24px;display:none;gap:10px;justify-content:center}
.verdict.visible{display:flex}
.v-btn{flex:1;max-width:220px;font-size:14px;font-weight:500;padding:13px 20px;border-radius:14px;border:none;cursor:pointer;transition:all .15s}
.v-btn.no{background:#fef2f2;color:#c0392b;border:1.5px solid #f5c6c6}
.v-btn.no:hover{background:#fde8e8}
.v-btn.yes{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-border)}
.v-btn.yes:hover{background:#e3f6ea}

/* FINISH */
.finish{display:none;max-width:440px;margin:60px auto;text-align:center;padding:0 20px}
.finish.active{display:block}
.finish-emoji{font-size:52px;margin-bottom:16px}
.finish h2{font-size:22px;font-weight:500;margin-bottom:6px}
.finish p{font-size:14px;color:var(--text2);margin-bottom:28px}
.finish-stats{display:flex;gap:12px;justify-content:center;margin-bottom:32px}
.fs{background:white;border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;min-width:90px}
.fs-n{font-size:26px;font-weight:500}
.fs-n.green{color:var(--green)}
.fs-n.red{color:var(--red)}
.fs-l{font-size:11px;color:var(--text3);margin-top:3px}
.finish-actions{display:flex;gap:10px;justify-content:center}
.restart-btn{font-size:14px;font-weight:500;padding:11px 28px;border-radius:20px;border:none;background:var(--red);color:#fff;cursor:pointer}
.back-btn2{font-size:14px;padding:11px 22px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <div class="logo">HSK 1 · Тренажёр</div>
  <div class="hdr-right">
    <div class="progress" id="hdr-progress"></div>
    <button class="exit-btn" id="exit-btn" onclick="goSetup()">← Назад</button>
  </div>
</div>

<!-- SETUP -->
<div class="setup" id="setup">
  <div class="setup-hero">
    <h1>写字练习</h1>
    <p>Пиньинь + перевод → пишешь → сравниваешь → оцениваешь</p>
  </div>

  <div class="setup-section">
    <div class="setup-section-label">Выбери уроки</div>
    <div class="select-all-row">
      <button class="sel-btn" onclick="selectAll()">Выбрать все</button>
      <button class="sel-btn" onclick="selectNone()">Снять все</button>
    </div>
    <div class="lessons-grid" id="lessons-grid"></div>
  </div>

  <div class="setup-footer">
    <button class="start-btn" id="start-btn" onclick="startSession()">Начать тренировку</button>
    <div class="word-count" id="word-count"></div>
  </div>
</div>

<!-- TRAINER -->
<div class="trainer" id="trainer">
  <div class="queue-bar"><div class="queue-fill" id="queue-fill"></div></div>

  <div class="card">
    <div class="card-prompt">
      <div class="card-pinyin" id="c-pinyin"></div>
      <div class="card-trans" id="c-trans"></div>
    </div>

    <div class="card-write" id="card-write-block">
      <div class="write-label" id="write-label">Напиши иероглиф</div>
      <div class="write-cells" id="write-cells"></div>
      <div class="write-controls">
        <button class="erase-btn" onclick="clearCanvases()">Стереть всё</button>
        <button class="show-btn" id="show-btn" onclick="revealAnswer()">Показать ответ →</button>
      </div>
    </div>

    <div class="answer-row" id="answer-row">
      <!-- Строка 1: мой вариант -->
      <div class="answer-section">
        <div class="answer-sublabel">Твой вариант</div>
        <div class="answer-cells" id="preview-cells"></div>
      </div>

      <!-- Строка 2: порядок черт — по одной строке на иероглиф -->
      <div class="answer-section" id="stroke-order-section">
        <div class="answer-sublabel">Порядок черт</div>
        <div id="stroke-order-row">
          <div class="stroke-loading">Загрузка...</div>
        </div>
      </div>

      <!-- Строка 3: правильный ответ -->
      <div class="answer-section answer-section-correct">
        <div class="answer-sublabel">Правильно</div>
        <div id="correct-box"></div>
      </div>
    </div>

    <div class="verdict" id="verdict">
      <button class="v-btn no" onclick="verdict(false)">✗ Не помню</button>
      <button class="v-btn yes" onclick="verdict(true)">✓ Помню</button>
    </div>
  </div>
</div>

<!-- FINISH -->
<div class="finish" id="finish">
  <div class="finish-emoji">🎉</div>
  <h2>Сессия завершена!</h2>
  <p>Все слова пройдены хотя бы раз</p>
  <div class="finish-stats">
    <div class="fs"><div class="fs-n green" id="fs-yes">0</div><div class="fs-l">Запомнил</div></div>
    <div class="fs"><div class="fs-n red" id="fs-no">0</div><div class="fs-l">Не помню</div></div>
    <div class="fs"><div class="fs-n" id="fs-total">0</div><div class="fs-l">Всего</div></div>
  </div>
  <div class="finish-actions">
    <button class="restart-btn" onclick="restartSession()">Повторить</button>
    <button class="back-btn2" onclick="goSetup()">На главную</button>
  </div>
</div>

const strokeCache = {};

async function loadChar(ch) {
  if (strokeCache[ch]) return strokeCache[ch];
  try {
    const r = await fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0.1/${encodeURIComponent(ch)}.json`);
    if (r.ok) { strokeCache[ch] = await r.json(); }
  } catch(e) {}
  return strokeCache[ch] || null;
}

async function renderStrokeOrder(word) {
  const container = document.getElementById('stroke-order-row');
  container.innerHTML = '<div class="stroke-loading">Загрузка...</div>';

  const chars = [...word.h].filter(c => c.codePointAt(0) > 0x2E7F);
  if (!chars.length) { container.innerHTML = ''; return; }

  await Promise.all(chars.map(ch => loadChar(ch)));

  const CELL = 48, PAD = 4, sc = (CELL - PAD*2) / 1024;

  let html = '';
  chars.forEach(ch => {
    const data = strokeCache[ch];
    if (!data) return;
    const n = data.strokes.length;

    html += `<div class="so-char-row">`;

    // Сам иероглиф — клетка с сеткой, все черты чёрные
    const allPaths = data.strokes.map(s =>
      `<path d="${s}" fill="#1a1a18" transform="translate(${PAD},${CELL-PAD}) scale(${sc},${-sc})"/>`
    ).join('');
    html += `<div class="so-cell">
      <div class="so-svg-wrap">
        <svg width="${CELL}" height="${CELL}" viewBox="0 0 ${CELL} ${CELL}" xmlns="http://www.w3.org/2000/svg">${allPaths}</svg>
      </div>
      <div class="so-num" style="color:#1a1a18;font-weight:500">${ch}</div>
    </div>`;

    // Разделитель
    html += `<div style="width:1px;background:#ddd9d0;margin:0 4px;align-self:stretch"></div>`;

    // Шаги
    for (let si = 0; si < n; si++) {
      const paths = data.strokes.map((s, j) => {
        const fill = j < si ? '#555' : j === si ? '#c0392b' : '#e0ddd8';
        return `<path d="${s}" fill="${fill}" transform="translate(${PAD},${CELL-PAD}) scale(${sc},${-sc})"/>`;
      }).join('');
      html += `<div class="so-cell">
        <div class="so-svg-wrap">
          <svg width="${CELL}" height="${CELL}" viewBox="0 0 ${CELL} ${CELL}" xmlns="http://www.w3.org/2000/svg">${paths}</svg>
        </div>
        <div class="so-num">${si+1}</div>
      </div>`;
    }
    html += `</div>`;
  });

  container.innerHTML = html || '<div class="stroke-loading">Нет данных</div>';
}

// --- BUILD SETUP ---
function buildLessonsGrid() {
  const grid = document.getElementById('lessons-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 15; i++) {
    const title = LESSON_TITLES[i];
    const cnt = LESSON_COUNTS[i] || 0;
    const active = selectedLessons.has(i) ? 'active' : '';
    grid.innerHTML += `<div class="lesson-card ${active}" id="lcard-${i}" onclick="toggleLesson(${i})">
      <div class="lc-num">Урок ${i}</div>
      <div class="lc-title">${title}</div>
      <div class="lc-count">${cnt} слов</div>
    </div>`;
  }
  updateWordCount();
}

function toggleLesson(n) {
  if (selectedLessons.has(n)) selectedLessons.delete(n);
  else selectedLessons.add(n);
  document.getElementById(`lcard-${n}`).classList.toggle('active', selectedLessons.has(n));
  updateWordCount();
}

function selectAll() {
  for (let i=1;i<=15;i++) { selectedLessons.add(i); document.getElementById(`lcard-${i}`).classList.add('active'); }
  updateWordCount();
}
function selectNone() {
  for (let i=1;i<=15;i++) { selectedLessons.delete(i); document.getElementById(`lcard-${i}`).classList.remove('active'); }
  updateWordCount();
}

function updateWordCount() {
  const n = WORDS.filter(w => selectedLessons.has(w.l)).length;
  document.getElementById('word-count').textContent = n > 0 ? `${n} слов в сессии` : 'Выбери хотя бы один урок';
  document.getElementById('start-btn').disabled = n === 0;
}

// --- SESSION ---
function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function startSession() {
  const words = WORDS.filter(w => selectedLessons.has(w.l));
  if (!words.length) return;
  queue = shuffle([...words]);
  totalCards = queue.length;
  doneYes = 0; doneNo = 0;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('finish').classList.remove('active');
  document.getElementById('trainer').classList.add('active');
  document.getElementById('exit-btn').classList.add('visible');
  if (window.Telegram?.WebApp?.BackButton) {
    window.Telegram.WebApp.BackButton.show();
  }
  nextCard();
}

function restartSession() {
  document.getElementById('finish').classList.remove('active');
  startSession();
}

function goSetup() {
  document.getElementById('trainer').classList.remove('active');
  document.getElementById('finish').classList.remove('active');
  document.getElementById('setup').style.display = '';
  document.getElementById('exit-btn').classList.remove('visible');
  document.getElementById('hdr-progress').innerHTML = '';
  if (window.Telegram?.WebApp?.BackButton) {
    window.Telegram.WebApp.BackButton.hide();
  }
}

function nextCard() {
  if (!queue.length) { showFinish(); return; }
  currentWord = queue.shift();
  const chars = [...currentWord.h].filter(c => c.codePointAt(0) > 0x2E7F);
  const nChars = Math.max(chars.length, 1);

  // Сброс
  document.getElementById('answer-row').classList.remove('visible');
  document.getElementById('verdict').classList.remove('visible');
  document.getElementById('show-btn').style.display = '';
  document.getElementById('card-write-block').style.display = '';

  // Вопрос
  document.getElementById('c-pinyin').textContent = currentWord.p;
  document.getElementById('c-trans').textContent = currentWord.t;
  document.getElementById('write-label').textContent = nChars > 1
    ? `Напиши иероглифы (${nChars} знака)`
    : 'Напиши иероглиф';

  // Строим клетки для рисования
  const writeCells = document.getElementById('write-cells');
  writeCells.innerHTML = chars.map((ch, i) => {
    const hint = ''; // подсказка убрана — иероглиф показывается только в ответе
    return `<div class="write-cell-group">${hint}${makeWriteCell(i)}</div>`;
  }).join('');

  // Строим превью клетки
  const previewCells = document.getElementById('preview-cells');
  previewCells.innerHTML = chars.map((_, i) => makePreviewCell(i)).join('');

  // Инициализируем canvas
  drawCanvases = [];
  chars.forEach((_, i) => {
    const cv = document.getElementById(`cv-${i}`);
    const ctx = cv.getContext('2d');
    ctx.strokeStyle = '#1a1a18';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    drawCanvases.push({cv, ctx});

    function getPos(e) {
      const r = cv.getBoundingClientRect();
      const sx = cv.width/r.width, sy = cv.height/r.height;
      if (e.touches) return {x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};
      return {x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
    }
    cv.addEventListener('mousedown', e => { isDrawing=true; activeCanvas=i; const p=getPos(e); lastX=p.x; lastY=p.y; });
    cv.addEventListener('mousemove', e => {
      if (!isDrawing||activeCanvas!==i) return;
      const p=getPos(e);
      ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke();
      lastX=p.x; lastY=p.y;
    });
    cv.addEventListener('mouseup', ()=>isDrawing=false);
    cv.addEventListener('mouseleave', ()=>isDrawing=false);
    cv.addEventListener('touchstart', e=>{e.preventDefault();isDrawing=true;activeCanvas=i;const p=getPos(e);lastX=p.x;lastY=p.y;},{passive:false});
    cv.addEventListener('touchmove', e=>{
      if(!isDrawing||activeCanvas!==i)return;e.preventDefault();
      const p=getPos(e);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();lastX=p.x;lastY=p.y;
    },{passive:false});
    cv.addEventListener('touchend',()=>isDrawing=false);
  });

  // Прогресс
  const done = doneYes + doneNo;
  const pct = totalCards > 0 ? (done / totalCards * 100) : 0;
  document.getElementById('queue-fill').style.width = pct + '%';
  document.getElementById('hdr-progress').innerHTML = `<b>${done}</b> / ${totalCards}`;
}

function clearCanvases() {
  drawCanvases.forEach(({cv,ctx}) => ctx.clearRect(0,0,cv.width,cv.height));
}

function revealAnswer() {
  // Копируем рисунки в превью
  drawCanvases.forEach(({cv}, i) => {
    const pcv = document.getElementById(`pcv-${i}`);
    if (pcv) pcv.getContext('2d').drawImage(cv, 0, 0);
  });

  // Скрываем блок написания
  document.getElementById('card-write-block').style.display = 'none';

  // Правильный ответ — иероглиф в том же стиле что порядок черт
  const chars = [...currentWord.h].filter(c => c.codePointAt(0) > 0x2E7F);
  const fontSize = chars.length > 2 ? 38 : chars.length > 1 ? 48 : 60;
  document.getElementById('correct-box').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:10px">
      <div style="font-size:${fontSize}px;line-height:1;color:#1a1a18">${currentWord.h}</div>
      <div style="font-size:14px;color:#c0392b">${currentWord.p}</div>
    </div>`;

  document.getElementById('answer-row').classList.add('visible');
  document.getElementById('verdict').classList.add('visible');
  document.getElementById('show-btn').style.display = 'none';

  renderStrokeOrder(currentWord);
}

function verdict(remembered) {
  if (remembered) doneYes++;
  else { doneNo++; queue.push(currentWord); }
  nextCard();
}

function showFinish() {
  document.getElementById('trainer').classList.remove('active');
  document.getElementById('exit-btn').classList.remove('visible');
  const f = document.getElementById('finish');
  f.classList.add('active');
  document.getElementById('fs-yes').textContent = doneYes;
  document.getElementById('fs-no').textContent = doneNo;
  document.getElementById('fs-total').textContent = totalCards;
  document.getElementById('hdr-progress').innerHTML = '';
}

buildLessonsGrid();

// Telegram Mini App init
if (window.Telegram && window.Telegram.WebApp) {
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand(); // полный экран
  // Кнопка назад в хедере Telegram
  tg.BackButton.onClick(() => {
    const trainer = document.getElementById('trainer');
    const finish = document.getElementById('finish');
    if (trainer.classList.contains('active') || finish.classList.contains('active')) {
      goSetup();
      tg.BackButton.hide();
    }
  });
}
</script>
</body>
</html>
