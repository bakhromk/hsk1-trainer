<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>部首 · Радикалы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f6;--bg2:#f2f0eb;--border:#ddd9d0;--border2:#c9c4b8;
  --text:#1a1a18;--text2:#6b6860;--text3:#a09d96;
  --red:#c0392b;--red-bg:#fdf0ef;--red-border:#e8b5ac;
  --font:'Noto Sans SC','Inter',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{
  position:sticky;top:0;z-index:20;background:var(--bg);
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.back-btn{font-size:12px;padding:5px 12px;border-radius:14px;border:1px solid var(--border2);background:transparent;color:var(--text2);text-decoration:none;white-space:nowrap;cursor:pointer}
.logo{font-size:15px;font-weight:500}

/* QUICK NAV 1-14 */
.quicknav{
  position:sticky;top:49px;z-index:19;background:var(--bg);
  display:flex;gap:6px;padding:10px 16px;overflow-x:auto;
  border-bottom:1px solid var(--border);
}
.quicknav::-webkit-scrollbar{display:none}
.qn-btn{
  flex-shrink:0;width:30px;height:30px;border-radius:8px;
  border:1px solid var(--border2);background:white;color:var(--text2);
  font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.qn-btn:hover{border-color:var(--red);color:var(--red)}
.qn-btn.empty{opacity:.35}

.main{padding:16px}

/* STROKE GROUP */
.group{margin-bottom:26px;scroll-margin-top:100px}
.group-hdr{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.group-num{font-size:15px;font-weight:600;color:var(--red)}
.group-label{font-size:13px;color:var(--text2)}
.group-count{font-size:11px;color:var(--text3);margin-left:auto}

.rad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px}
.rad-card{
  border:1.5px solid var(--border);border-radius:12px;padding:8px 4px;
  text-align:center;cursor:pointer;background:white;transition:all .12s;
}
.rad-card:hover{border-color:var(--red);background:var(--red-bg)}
.rad-card.empty{opacity:.55}
.rc-py{font-size:9.5px;color:var(--red);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-hz{font-size:24px;line-height:1;color:var(--text)}
.rc-count{font-size:8.5px;color:var(--text3);margin-top:3px}

/* DETAIL SCREEN */
.detail{display:none}
.detail.active{display:block}
.main.hidden{display:none}

.detail-hdr{
  display:flex;align-items:center;gap:16px;padding:20px 16px;
  background:white;border-bottom:1px solid var(--border);
}
.dh-hanzi{font-size:48px;line-height:1;color:var(--red)}
.dh-info{flex:1}
.dh-py{font-size:18px;color:var(--red);margin-bottom:2px}
.dh-meaning{font-size:14px;color:var(--text);margin-bottom:4px}
.dh-count{font-size:12px;color:var(--text3)}

.words-list{padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}
.word-card{
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:3px;
  border:1px solid var(--border);border-radius:12px;padding:10px 6px 8px;
  background:white;cursor:pointer;position:relative;
}
.word-card:hover{border-color:var(--red);background:var(--red-bg)}
.wc-hanzi{font-size:20px;line-height:1.15;color:var(--text)}
.wc-mid{width:100%}
.wc-py{font-size:10px;color:var(--red)}
.wc-trans{font-size:10px;color:var(--text2);line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wc-badge{position:absolute;top:5px;right:5px;font-size:8px;padding:2px 5px;border-radius:6px;font-weight:600}
.wc-badge.hsk1{background:var(--red-bg);color:var(--red)}
.wc-badge.hsk2{background:var(--bg2);color:var(--text2)}

.empty-state{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px}

/* ALL CHARS REFERENCE SECTION */
.section-divider{padding:16px 16px 8px;font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-top:8px solid var(--bg2)}
.section-sub{padding:0 16px 12px;font-size:12px;color:var(--text3)}
.ref-grid{padding:0 16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px}
.ref-card{border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;background:white}
.ref-py{font-size:10px;color:var(--red);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ref-hz-wrap{position:relative;width:44px;height:44px;margin:0 auto 4px;background:
  linear-gradient(var(--border) 1px, transparent 1px) 0 50%/100% 1px no-repeat,
  linear-gradient(90deg, var(--border) 1px, transparent 1px) 50% 0/1px 100% no-repeat;
  border:1px dashed var(--border2);border-radius:6px;
  display:flex;align-items:center;justify-content:center}
.ref-hz{font-size:24px;line-height:1;color:var(--text)}
.ref-trans{font-size:8.5px;color:var(--text3);line-height:1.25;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
</style>
</head>

const GROUP_LABELS = {
  1:'1 черта',2:'2 черты',3:'3 черты',4:'4 черты',5:'5 черт',6:'6 черт',
  7:'7 черт',8:'8 черт',9:'9 черт',10:'10 черт',11:'11 черт',12:'12 черт',
  13:'13 черт',14:'14 черт'
};

function buildQuickNav() {
  const nav = document.getElementById('quicknav');
  const groups = {};
  RADICALS.forEach(r => (groups[r.strokes] = groups[r.strokes] || []).push(r));

  nav.innerHTML = Object.keys(GROUP_LABELS).map(s => {
    const hasActive = (groups[s]||[]).some(r => (RADICAL_WORDS[r.char]||[]).length > 0);
    return `<button class="qn-btn${hasActive?'':' empty'}" onclick="scrollToGroup(${s})">${s}</button>`;
  }).join('');
}

function scrollToGroup(s) {
  document.getElementById('group-'+s).scrollIntoView({behavior:'smooth', block:'start'});
}

function buildGrid() {
  const groups = {};
  RADICALS.forEach(r => (groups[r.strokes] = groups[r.strokes] || []).push(r));

  const html = Object.keys(GROUP_LABELS).map(s => {
    const items = groups[s] || [];
    const activeCount = items.filter(r => (RADICAL_WORDS[r.char]||[]).length > 0).length;
    const cards = items.map(r => {
      const words = RADICAL_WORDS[r.char] || [];
      const n = words.length;
      const empty = n === 0;
      return `<div class="rad-card${empty?' empty':''}" onclick="openRadical('${r.char}')">
        <div class="rc-py">${r.pinyin}</div>
        <div class="rc-hz">${r.char}</div>
        <div class="rc-count">${n||'—'}</div>
      </div>`;
    }).join('');
    return `<div class="group" id="group-${s}">
      <div class="group-hdr">
        <span class="group-num">${s}</span>
        <span class="group-label">${GROUP_LABELS[s]}</span>
        <span class="group-count">${activeCount}/${items.length} активны</span>
      </div>
      <div class="rad-grid">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('main-grid').innerHTML = html;
}

function openRadical(char) {
  const meta = RADICALS.find(r => r.char === char);
  const words = (RADICAL_WORDS[char] || []).slice().sort((a,b) => a.hanzi.length - b.hanzi.length);

  document.getElementById('dh-hanzi').textContent = char;
  document.getElementById('dh-py').textContent = meta.pinyin;
  document.getElementById('dh-meaning').textContent = meta.meaning_ru;
  const totalAll = (RADICAL_ALL_CHARS[char] || []).length;
  document.getElementById('dh-count').textContent = `${words.length} слов из курса · ${totalAll} иероглифов всего · ${meta.strokes} черт`;

  document.getElementById('words-list').innerHTML = words.length
    ? words.map(w => `
      <button class="word-card" onclick="goToWord('${w.level}','${encodeURIComponent(w.hanzi)}')">
        <div class="wc-badge ${w.level}">${w.level==='hsk1'?'1':'2'}</div>
        <div class="wc-hanzi">${w.hanzi}</div>
        <div class="wc-mid">
          <div class="wc-py">${w.pinyin}</div>
          <div class="wc-trans">${w.trans}</div>
        </div>
      </button>`).join('')
    : `<div class="empty-state">Слов с этим радикалом пока нет в HSK1/HSK2</div>`;

  // Справочная секция: все частотные иероглифы языка с этим радикалом (GB2312)
  const refChars = (RADICAL_ALL_CHARS[char] || []).filter(c => !words.some(w => w.hanzi === c.char));
  const refSection = document.getElementById('all-chars-section');
  if (refChars.length) {
    refSection.innerHTML = `
      <div class="section-divider">Все иероглифы языка с этим радикалом</div>
      <div class="section-sub">${refChars.length} символов · только для справки, без перевода</div>
      <div class="ref-grid">${refChars.map(c => `
        <div class="ref-card">
          <div class="ref-py">${c.pinyin}</div>
          <div class="ref-hz-wrap"><div class="ref-hz">${c.char}</div></div>
          <div class="ref-trans">${c.trans || '—'}</div>
        </div>`).join('')}</div>`;
  } else {
    refSection.innerHTML = '';
  }

  document.getElementById('main-grid').classList.add('hidden');
  document.getElementById('quicknav').style.display = 'none';
  document.getElementById('detail').classList.add('active');
  window.scrollTo(0,0);
}

function closeDetail() {
  document.getElementById('detail').classList.remove('active');
  document.getElementById('main-grid').classList.remove('hidden');
  document.getElementById('quicknav').style.display = '';
}

function goToWord(level, hanziEncoded) {
  const file = level === 'hsk1' ? 'dashboard.html' : 'dashboard_hsk2.html';
  location.href = `${file}?openWord=${hanziEncoded}`;
}

buildQuickNav();
buildGrid();
</script>
